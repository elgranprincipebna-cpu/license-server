<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>MiniMarket — Licencias (v3)</title>
    <style>
      :root {
        font-family: system-ui, Segoe UI, sans-serif;
        color: #18181b;
        background: #f4f4f5;
      }
      body {
        margin: 0;
        padding: 24px;
        max-width: 960px;
        margin-inline: auto;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      .sub {
        color: #52525b;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 1px 3px rgb(0 0 0 / 6%);
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        color: #71717a;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 12px;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .btn-primary {
        background: #059669;
        color: #fff;
      }
      .btn-primary:hover {
        background: #047857;
      }
      .btn-ghost {
        background: #f4f4f5;
        color: #3f3f46;
        border: 1px solid #e4e4e7;
      }
      .msg {
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 12px;
        display: none;
      }
      .msg.show {
        display: block;
      }
      .msg.error {
        background: #fef2f2;
        color: #991b1b;
      }
      .msg.ok {
        background: #ecfdf5;
        color: #065f46;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid #f4f4f5;
      }
      th {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #71717a;
      }
      .mono {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 0.8rem;
        word-break: break-all;
      }
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      @media (min-width: 640px) {
        .grid-2 {
          grid-template-columns: 1fr 1fr;
        }
      }
      #gate {
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <h1>Licencias MiniMarket POS</h1>
    <p class="sub">
      Panel v3 — API: <span class="mono" id="apiBase"></span>
    </p>

    <div id="gate" class="card">
      <label>Clave de administrador (ADMIN_API_KEY en Railway)</label>
      <input id="adminKey" type="password" autocomplete="off" placeholder="ADMIN_API_KEY" />
      <button type="button" class="btn-primary" id="saveKeyBtn">Entrar</button>
    </div>

    <div id="app" style="display: none">
      <div class="card">
        <h2 style="margin: 0 0 12px; font-size: 1rem">Nueva licencia</h2>
        <div id="msg" class="msg"></div>
        <div class="grid grid-2">
          <div>
            <label>Machine ID</label>
            <input id="machineId" placeholder="WEB-…" />
          </div>
          <div>
            <label>Etiqueta</label>
            <input id="label" placeholder="Caja 1" />
          </div>
          <div>
            <label>Vence</label>
            <input id="expiresDate" type="date" />
          </div>
        </div>
        <button type="button" class="btn-primary" id="createBtn">Crear licencia</button>
        <p id="createdKey" class="mono" style="margin-top: 12px; color: #047857"></p>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px">
          <h2 style="margin: 0; font-size: 1rem">Licencias activas</h2>
          <button type="button" class="btn-ghost" id="refreshBtn">Actualizar</button>
        </div>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>Etiqueta</th>
                <th>Machine ID</th>
                <th>Clave</th>
                <th>Vence</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const PANEL_V = 3;
        const KEY_STORAGE = "license_admin_key_v3";
        const API = window.location.origin.replace(/\/$/, "");

        const gate = document.getElementById("gate");
        const app = document.getElementById("app");
        const msgEl = document.getElementById("msg");
        const tbody = document.getElementById("tbody");
        const expiresDate = document.getElementById("expiresDate");
        document.getElementById("apiBase").textContent = API;
        expiresDate.value = "2030-12-31";

        function getKey() {
          return (sessionStorage.getItem(KEY_STORAGE) || "").trim();
        }
        function setKey(k) {
          sessionStorage.setItem(KEY_STORAGE, k.trim());
        }

        function showMsg(text, ok) {
          if (!text) {
            msgEl.className = "msg";
            msgEl.textContent = "";
            return;
          }
          msgEl.className = "msg show " + (ok ? "ok" : "error");
          msgEl.textContent = text;
        }

        function authHeaders() {
          return {
            Accept: "application/json",
            "Content-Type": "application/json",
            Authorization: "Bearer " + getKey(),
          };
        }

        async function fetchJson(path, init) {
          const url = API + path;
          const res = await fetch(url, init);
          const text = await res.text();
          let data;
          try {
            data = text ? JSON.parse(text) : {};
          } catch {
            const snippet = text.replace(/\s+/g, " ").trim().slice(0, 120);
            if (text.trim().startsWith("<") || text.includes("<!DOCTYPE")) {
              throw new Error(
                "El servidor devolvio HTML en lugar de JSON. " +
                  "Railway aun no tiene el deploy v3. Haga push a GitHub y espere redeploy. (" +
                  res.status +
                  ")"
              );
            }
            throw new Error("Respuesta invalida (" + res.status + "): " + snippet);
          }
          return { res, data };
        }

        function toIsoEndOfDay(dateStr) {
          return new Date(dateStr + "T23:59:59.000Z").toISOString();
        }

        function showApp(loggedIn) {
          gate.style.display = loggedIn ? "none" : "block";
          app.style.display = loggedIn ? "block" : "none";
        }

        async function load() {
          showMsg("");
          try {
            const { res, data } = await fetchJson("/admin/licenses", { headers: authHeaders() });
            if (res.status === 401 || res.status === 503) {
              setKey("");
              showApp(false);
              showMsg(data.error || data.hint || "Clave incorrecta o no configurada en Railway.", false);
              return;
            }
            if (!res.ok) {
              showMsg(data.error || "Error " + res.status, false);
              return;
            }
            tbody.innerHTML = "";
            for (const row of data.licenses || []) {
              const tr = document.createElement("tr");
              const exp = String(row.expires_at).slice(0, 10);
              tr.innerHTML =
                "<td>" +
                (row.label || "—") +
                "</td><td class=\"mono\">" +
                row.machine_id +
                "</td><td class=\"mono\">" +
                row.license_key +
                '</td><td><input type="date" data-id="' +
                row.id +
                '" value="' +
                exp +
                '" style="margin:0;width:auto" /></td><td class="row-actions">' +
                '<button type="button" class="btn-ghost" data-save="' +
                row.id +
                '">Guardar</button> ' +
                '<button type="button" class="btn-ghost" data-del="' +
                row.id +
                '">Eliminar</button></td>';
              tbody.appendChild(tr);
            }
            tbody.querySelectorAll("[data-save]").forEach(function (btn) {
              btn.onclick = async function () {
                const id = btn.getAttribute("data-save");
                const input = tbody.querySelector('input[data-id="' + id + '"]');
                try {
                  const { res: r, data: d } = await fetchJson("/admin/licenses/" + id, {
                    method: "PATCH",
                    headers: authHeaders(),
                    body: JSON.stringify({ expiresAt: toIsoEndOfDay(input.value) }),
                  });
                  if (!r.ok) throw new Error(d.error || r.statusText);
                  showMsg("Fecha actualizada.", true);
                  await load();
                } catch (e) {
                  showMsg(e.message || String(e), false);
                }
              };
            });
            tbody.querySelectorAll("[data-del]").forEach(function (btn) {
              btn.onclick = async function () {
                if (!confirm("Eliminar esta licencia?")) return;
                const id = btn.getAttribute("data-del");
                await fetchJson("/admin/licenses/" + id, { method: "DELETE", headers: authHeaders() });
                await load();
              };
            });
          } catch (e) {
            showMsg(e.message || String(e), false);
          }
        }

        document.getElementById("saveKeyBtn").onclick = function () {
          const k = document.getElementById("adminKey").value.trim();
          if (!k) return;
          setKey(k);
          showApp(true);
          void load();
        };

        document.getElementById("refreshBtn").onclick = function () {
          void load();
        };

        document.getElementById("createBtn").onclick = async function () {
          showMsg("");
          document.getElementById("createdKey").textContent = "";
          const machineId = document.getElementById("machineId").value.trim();
          if (machineId.length < 8) {
            showMsg("Machine ID demasiado corto (min. 8 caracteres).", false);
            return;
          }
          try {
            const { res, data } = await fetchJson("/admin/licenses", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({
                machineId: machineId,
                label: document.getElementById("label").value.trim() || undefined,
                expiresAt: toIsoEndOfDay(expiresDate.value),
              }),
            });
            if (!res.ok) throw new Error(data.error || res.statusText);
            document.getElementById("createdKey").textContent =
              "Licencia creada. Clave opcional: " + data.licenseKey;
            showMsg("Licencia registrada.", true);
            document.getElementById("machineId").value = "";
            await load();
          } catch (e) {
            showMsg(e.message || String(e), false);
          }
        };

        fetch(API + "/health")
          .then(function (r) {
            return r.json();
          })
          .then(function (h) {
            if (h.panelVersion && h.panelVersion < PANEL_V) {
              showMsg("Servidor API v" + h.panelVersion + " — espere redeploy del panel v3.", false);
            }
          })
          .catch(function () {});

        if (getKey()) {
          showApp(true);
          void load();
        } else {
          showApp(false);
        }
      })();
    </script>
  </body>
</html>
