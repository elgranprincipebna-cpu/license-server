    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0c4a6e" flood-opacity="0.35"/>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="74" fill="url(#sky)" filter="url(#soft)"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.85"/>
  <!-- Venezuela tricolor arc -->
  <path d="M18 92 A62 62 0 0 1 142 92" fill="none" stroke="#FFCC00" stroke-width="10" stroke-linecap="round"/>
  <path d="M24 98 A56 56 0 0 1 136 98" fill="none" stroke="#003893" stroke-width="10" stroke-linecap="round"/>
  <path d="M30 104 A50 50 0 0 1 130 104" fill="none" stroke="#CF142B" stroke-width="10" stroke-linecap="round"/>
