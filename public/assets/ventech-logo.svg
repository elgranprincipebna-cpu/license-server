  <g fill="#FFCC00" opacity="0.95">
    <polygon points="38,58 39.2,61.2 42.6,61.2 39.8,63.2 40.8,66.6 38,64.6 35.2,66.6 36.2,63.2 33.4,61.2 36.8,61.2"/>
    <polygon points="48,52 49.1,54.8 52.2,54.8 49.8,56.5 50.7,59.2 48,57.4 45.3,59.2 46.2,56.5 43.8,54.8 46.9,54.8"/>
    <polygon points="58,48 59,50.5 61.8,50.5 59.7,52 60.5,54.5 58,53 55.5,54.5 56.3,52 54.2,50.5 57,50.5"/>
    <polygon points="102,48 103,50.5 105.8,50.5 103.7,52 104.5,54.5 102,53 99.5,54.5 100.3,52 98.2,50.5 101,50.5"/>
    <polygon points="112,52 113.1,54.8 116.2,54.8 113.8,56.5 114.7,59.2 112,57.4 109.3,59.2 110.2,56.5 107.8,54.8 110.9,54.8"/>
    <polygon points="122,58 123.2,61.2 126.6,61.2 123.8,63.2 124.8,66.6 122,64.6 119.2,66.6 120.2,63.2 117.4,61.2 120.8,61.2"/>
